version: "3.8"

services:
  catclaw-server:
    image: ghcr.io/kankejiang/catclaw-server:latest
    container_name: catclaw-server
    restart: unless-stopped
    ports:
      - "66880:66880"       # HTTP API + Web UI
      - "66881:66881/udp"   # DHT P2P
    volumes:
      - /path/to/music:/music:ro   # Music directory (read-only)
      - /path/to/data:/data        # Persistent database
    environment:
      - BOOTSTRAP_NODES=music.08102516.xyz:6881
      - RATE_LIMIT=128             # KB/s, 0 = unlimited
      - DEVICE_NAME=MyNAS          # Display name
    # Optional: override default flags
    # command:
    #   - "--music-dir=/music"
    #   - "--db-path=/data/catclaw.db"
    #   - "--http-port=66880"
    #   - "--dht-port=66881"
    #   - "--bootstrap=music.08102516.xyz:6881"
    #   - "--rate-limit=128"
    #   - "--device-name=MyNAS"
