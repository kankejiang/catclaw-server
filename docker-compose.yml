# CatClaw Music Server — 一键部署
# 使用方法：
#   1. 把 /mnt/media/music 改成你的音乐目录
#   2. docker compose up -d --build
#   3. 浏览器打开 http://NAS-IP:37823 注册管理员

services:
  catclaw-server:
    build: .
    container_name: catclaw-server
    restart: unless-stopped
    networks:
      - catclaw-net
    ports:
      - "37823:37823"       # HTTP / WebSocket / Web UI
      - "37824:37824/udp"   # STUN（NAT 打洞）
      - "37825:37825/udp"   # DHT（节点发现）
    environment:
      MusicServer__MusicDirectory: /music
      MusicServer__DbPath: /data/catclaw.db
      MusicServer__CoverOutputDir: /data/covers
      MusicServer__AccessToken: ""
      MusicServer__AdminUser: admin
      MusicServer__AdminPassword: ""
      ASPNETCORE_URLS: "http://0.0.0.0:37823"
      # ── 流媒体 ──
      Streaming__HlsEnabled: "true"
      Streaming__FFmpegPath: /usr/bin/ffmpeg
      Streaming__TranscodeDir: /data/transcode
      # ── P2P ──
      ClawCircle__DhtEnabled: "true"
      ClawCircle__DhtPort: "37825"
    volumes:
      - /mnt/media/music:/music
      - ./catclaw-data:/data

networks:
  catclaw-net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.30.0.0/16
        - subnet: fd00:catclaw::/64
