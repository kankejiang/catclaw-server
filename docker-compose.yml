services:
  catclaw-server:
    build: .
    container_name: catclaw-server
    restart: unless-stopped
    ports:
      - "37823:37823"
    environment:
      # 音乐目录（挂载到容器 /music）
      - MusicServer__MusicDirectory=/music
      # 数据库与封面输出（持久化到卷 /data）
      - MusicServer__DbPath=/data/catclaw.db
      - MusicServer__CoverOutputDir=/data/covers
      # 内网访问令牌：请改成强随机值（手机端连接时作为 password 填写）
      - MusicServer__AccessToken=CHANGE_ME_STRONG_TOKEN
      - ASPNETCORE_URLS=http://0.0.0.0:37823
    volumes:
      # 把左侧改成你 NAS 上的音乐目录
      - /path/to/your/music:/music
      - catclaw-data:/data

volumes:
  catclaw-data:
