<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatClaw Music Server</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#0f0f23; color:#e0e0e0; display:flex; height:100vh; overflow:hidden; }
.sidebar { width:220px; background:#1a1a2e; display:flex; flex-direction:column; padding:20px 0; flex-shrink:0; }
.sidebar h2 { color:#00d4ff; text-align:center; margin-bottom:30px; font-size:20px; }
.nav-item { padding:12px 24px; cursor:pointer; color:#aaa; transition:all 0.2s; border-left:3px solid transparent; }
.nav-item:hover, .nav-item.active { color:#fff; background:#16213e; border-left-color:#00d4ff; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.topbar { padding:16px 24px; background:#16213e; display:flex; align-items:center; gap:16px; flex-shrink:0; }
.search-box { flex:1; padding:10px 16px; border-radius:20px; border:1px solid #333; background:#0f0f23; color:#e0e0e0; font-size:14px; }
.search-box:focus { outline:none; border-color:#00d4ff; }
.content { flex:1; overflow-y:auto; padding:24px; }
/* 通用行 */
.song-row { display:flex; align-items:center; padding:10px 16px; border-radius:8px; cursor:pointer; transition:background 0.2s; }
.song-row:hover, .song-row.playing { background:#16213e; color:#00d4ff; }
.song-row .idx { width:32px; color:#666; flex-shrink:0; }
.song-row .title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.song-row .artist { width:160px; color:#888; font-size:13px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.song-row .album { width:160px; color:#888; font-size:13px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.song-row .dur { width:50px; color:#666; font-size:12px; text-align:right; flex-shrink:0; }
/* 卡片 */
.artist-grid, .album-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }
.artist-card, .album-card { background:#1a1a2e; border-radius:12px; padding:16px; cursor:pointer; transition:background 0.2s; }
.artist-card:hover, .album-card:hover { background:#16213e; }
.cover-img { width:100%; aspect-ratio:1; border-radius:8px; object-fit:cover; background:#222; display:flex; align-items:center; justify-content:center; font-size:48px; }
.artist-card .name, .album-card .title { font-weight:600; margin-top:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.artist-card .count, .album-card .meta { color:#888; font-size:12px; margin-top:4px; }
/* 分页 */
.pagination { display:flex; gap:8px; align-items:center; justify-content:center; padding:16px; }
.pagination button { padding:6px 14px; border-radius:6px; border:1px solid #333; background:#1a1a2e; color:#e0e0e0; cursor:pointer; }
.pagination button:disabled { opacity:0.3; cursor:default; }
.pagination .page-info { color:#888; }
/* 播放器 */
.player-bar { position:fixed; bottom:0; left:220px; right:0; height:72px; background:#1a1a2e; border-top:1px solid #333; display:flex; align-items:center; padding:0 24px; gap:16px; z-index:50; }
.cover-sm { width:48px; height:48px; border-radius:6px; object-fit:cover; background:#333; flex-shrink:0; }
.player-bar .info { min-width:0; }
.player-bar .np-title { font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.player-bar .np-artist { font-size:12px; color:#888; }
.player-bar .controls { display:flex; align-items:center; gap:12px; flex-shrink:0; }
.player-bar button { background:none; border:none; color:#e0e0e0; font-size:20px; cursor:pointer; padding:4px 8px; }
.progress-wrap { flex:1; display:flex; align-items:center; gap:8px; min-width:0; }
.progress-wrap input[type=range] { flex:1; accent-color:#00d4ff; min-width:0; }
.volume-wrap { display:flex; align-items:center; gap:8px; flex-shrink:0; }
/* 歌词面板 */
.lyrics-panel { position:fixed; top:0; right:0; width:320px; height:100vh; background:#0f0f23; border-left:1px solid #333; padding:24px 16px; overflow-y:auto; display:none; z-index:100; }
.lyrics-panel.show { display:block; }
.lyrics-panel .close-btn { position:absolute; top:12px; right:12px; background:none; border:none; color:#e0e0e0; font-size:20px; cursor:pointer; }
.lyrics-panel pre { color:#e0e0e0; font-size:14px; line-height:1.8; white-space:pre-wrap; }
/* 设置页 */
.settings-section { background:#1a1a2e; border-radius:12px; padding:20px; margin-bottom:16px; }
.settings-section h3 { margin-bottom:12px; color:#00d4ff; }
.setting-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid #222; }
.setting-row:last-child { border-bottom:none; }
.setting-label { color:#aaa; font-size:14px; }
.setting-value { color:#e0e0e0; font-size:14px; }
.btn-primary { padding:8px 20px; border-radius:6px; border:none; background:#00d4ff; color:#0f0f23; font-weight:600; cursor:pointer; font-size:14px; }
.btn-primary:hover { background:#00b8e6; }
.btn-danger { padding:8px 20px; border-radius:6px; border:none; background:#ff4757; color:#fff; font-weight:600; cursor:pointer; font-size:14px; }
.btn-danger:hover { background:#e8414f; }
.btn-secondary { padding:8px 20px; border-radius:6px; border:1px solid #555; background:transparent; color:#e0e0e0; cursor:pointer; font-size:14px; }
.btn-secondary:hover { border-color:#00d4ff; color:#00d4ff; }
.progress-bar-wrap { background:#222; border-radius:4px; height:8px; margin-top:8px; overflow:hidden; }
.progress-bar-fill { height:100%; background:#00d4ff; border-radius:4px; transition:width 0.3s; width:0; }
input[type=text].setting-input { padding:8px 12px; border-radius:6px; border:1px solid #333; background:#0f0f23; color:#e0e0e0; font-size:14px; width:300px; }
input[type=text].setting-input:focus { outline:none; border-color:#00d4ff; }
/* 播放列表 */
.playlist-card { background:#1a1a2e; border-radius:10px; padding:14px 18px; cursor:pointer; transition:background 0.2s; display:flex; align-items:center; justify-content:space-between; }
.playlist-card:hover { background:#16213e; }
.playlist-card .pl-name { font-weight:600; font-size:15px; }
.playlist-card .pl-meta { color:#888; font-size:12px; margin-top:4px; }
.playlist-cards { display:flex; flex-direction:column; gap:10px; }
/* 模态框 */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:200; }
.modal { background:#1a1a2e; border-radius:14px; padding:28px; min-width:360px; max-width:500px; width:90%; }
.modal h3 { margin-bottom:16px; }
.modal label { display:block; margin-top:12px; color:#aaa; font-size:13px; }
.modal input[type=text], .modal textarea { width:100%; padding:8px 12px; border-radius:6px; border:1px solid #333; background:#0f0f23; color:#e0e0e0; font-size:14px; margin-top:4px; }
.modal textarea { resize:vertical; min-height:60px; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
/* 播放列表详情 */
.playlist-header { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
.playlist-header h2 { font-size:20px; }
.playlist-song-row { display:flex; align-items:center; padding:8px 12px; border-radius:8px; cursor:pointer; transition:background 0.2s; }
.playlist-song-row:hover { background:#16213e; }
.playlist-song-row .pl-song-idx { width:28px; color:#666; font-size:13px; }
.playlist-song-row .pl-song-title { flex:1; font-size:14px; }
.playlist-song-row .pl-song-artist { width:140px; color:#888; font-size:13px; }
.playlist-song-row .pl-song-dur { width:50px; color:#666; font-size:12px; text-align:right; }
.playlist-song-row .pl-song-actions { width:60px; text-align:right; }
.playlist-song-row .pl-song-actions button { background:none; border:none; color:#888; cursor:pointer; font-size:16px; padding:2px 6px; }
.playlist-song-row .pl-song-actions button:hover { color:#ff4757; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>🎵 CatClaw</h2>
  <div class="nav-item active" onclick="switchTab('songs',this)">🎵 歌曲</div>
  <div class="nav-item" onclick="switchTab('artists',this)">🎤 艺术家</div>
  <div class="nav-item" onclick="switchTab('albums',this)">💿 专辑</div>
  <div class="nav-item" onclick="switchTab('playlists',this)">📋 播放列表</div>
  <div class="nav-item" onclick="switchTab('settings',this)">⚙️ 设置</div>
  <div style="border-top:1px solid #333; margin:8px 0;"></div>
  <div class="nav-item" onclick="doLogout()" style="color:#f66;">🚪 退出登录</div>
</div>

<div class="main">
  <div class="topbar">
    <input class="search-box" id="search-box" placeholder="搜索歌曲、艺术家、专辑..." oninput="onSearch(this.value)">
  </div>
  <div class="content" id="content"></div>
</div>

<!-- 播放器 -->
<div class="player-bar" id="player-bar" style="display:none">
  <img class="cover-sm" id="cover-sm" src="" alt="">
  <div class="info">
    <div class="np-title" id="np-title">未播放</div>
    <div class="np-artist" id="np-artist"></div>
  </div>
  <div class="controls">
    <button onclick="prevTrack()">⏮</button>
    <button id="btn-play" onclick="togglePlay()">▶</button>
    <button onclick="nextTrack()">⏭</button>
  </div>
  <div class="progress-wrap">
    <span id="time-cur">0:00</span>
    <input type="range" id="progress" min="0" max="100" value="0" oninput="seekTo(this.value)">
    <span id="time-total">0:00</span>
  </div>
  <div class="volume-wrap">
    <span>🔊</span>
    <input type="range" id="volume" min="0" max="100" value="80" oninput="setVolume(this.value)">
  </div>
  <button onclick="toggleLyrics()" title="歌词">📝</button>
</div>

<!-- 歌词面板 -->
<div class="lyrics-panel" id="lyrics-panel">
  <button class="close-btn" onclick="toggleLyrics()">✕</button>
  <pre id="lyrics-text"></pre>
</div>

<!-- 新建播放列表模态框 -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<audio id="audio"></audio>

<script>
const API = '/api';

// 全局 fetch 包装：401 → 跳转登录
const _origFetch = window.fetch;
window.fetch = function(...args) {
  return _origFetch(...args).then(r => {
    if (r.status === 401) { location.href = '/login.html'; throw new Error('请登录'); }
    return r;
  });
};

let currentTab = 'songs';
let currentPage = 1;
let pageSize = 50;
let totalItems = 0;
let playlist = [];
let currentIndex = -1;
let currentAudio = document.getElementById('audio');

// ── 播放器逻辑 ──
currentAudio.addEventListener('timeupdate', () => {
  const pct = currentAudio.duration ? currentAudio.currentTime / currentAudio.duration * 100 : 0;
  document.getElementById('progress').value = pct;
  document.getElementById('time-cur').textContent = fmtTime(currentAudio.currentTime);
});
currentAudio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-total').textContent = fmtTime(currentAudio.duration);
});
currentAudio.addEventListener('ended', nextTrack);

function playTrack(song) {
  const idx = playlist.findIndex(s => s.id === song.id);
  if (idx === -1) { playlist.push(song); currentIndex = playlist.length - 1; }
  else currentIndex = idx;
  document.getElementById('player-bar').style.display = 'flex';
  document.getElementById('np-title').textContent = song.title;
  document.getElementById('np-artist').textContent = song.artist || '未知';
  if (song.cover_art_path) {
    document.getElementById('cover-sm').src = API + '/songs/' + song.id + '/cover';
  } else {
    document.getElementById('cover-sm').src = '';
  }
  loadLyrics(song.id);
  currentAudio.src = API + '/songs/' + song.id + '/stream';
  currentAudio.play();
  document.getElementById('btn-play').textContent = '⏸';
  updatePlayingRow();
}

function togglePlay() {
  if (currentAudio.paused) { currentAudio.play(); document.getElementById('btn-play').textContent = '⏸'; }
  else { currentAudio.pause(); document.getElementById('btn-play').textContent = '▶'; }
}
function nextTrack() { if (currentIndex < playlist.length - 1) playTrack(playlist[currentIndex + 1]); }
function prevTrack() { if (currentIndex > 0) playTrack(playlist[currentIndex - 1]); }
function seekTo(v) { if(currentAudio.duration) currentAudio.currentTime = v / 100 * currentAudio.duration; }
function setVolume(v) { currentAudio.volume = v / 100; }
function fmtTime(s) { if (!s||isNaN(s)) return '0:00'; const m=Math.floor(s/60); return m+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function updatePlayingRow() {
  document.querySelectorAll('.song-row,.playlist-song-row').forEach(r => r.classList.remove('playing'));
  if (currentIndex >= 0) {
    const el = document.querySelector(`.song-row[data-id="${playlist[currentIndex]?.id}"]`);
    if (el) el.classList.add('playing');
  }
}

// ── 歌词 ──
async function loadLyrics(songId) {
  try {
    const r = await fetch(API + '/songs/' + songId + '/lyrics');
    document.getElementById('lyrics-text').textContent = r.ok ? await r.text() : '(暂无歌词)';
  } catch { document.getElementById('lyrics-text').textContent = '(加载失败)'; }
}
function toggleLyrics() { document.getElementById('lyrics-panel').classList.toggle('show'); }

// ── 标签页切换 ──
function switchTab(tab, el) {
  currentTab = tab; currentPage = 1;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(el) el.classList.add('active');
  loadTab();
}

// ── 加载内容 ──
async function loadTab() {
  const c = document.getElementById('content');
  if (currentTab === 'songs') await loadSongs(c);
  else if (currentTab === 'artists') await loadArtists(c);
  else if (currentTab === 'albums') await loadAlbums(c);
  else if (currentTab === 'playlists') await loadPlaylists(c);
  else if (currentTab === 'settings') await loadSettings(c);
}

// ── 歌曲列表 ──
async function loadSongs(container) {
  const r = await fetch(API + '/songs?page=' + currentPage + '&page_size=' + pageSize);
  const data = await r.json(); totalItems = data.total;
  let html = data.songs.map((s, i) =>
    `<div class="song-row" data-id="${s.id}" onclick='playTrack(${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <span class="idx">${(currentPage-1)*pageSize+i+1}</span>
      <span class="title">${esc(s.title)}</span>
      <span class="artist">${esc(s.artist)}</span>
      <span class="album">${esc(s.album)}</span>
      <span class="dur">${fmtTime(s.duration)}</span>
    </div>`).join('');
  container.innerHTML = `<div class="song-row" style="color:#666;font-size:12px;cursor:default;"><span class="idx">#</span><span class="title">标题</span><span class="artist">艺术家</span><span class="album">专辑</span><span class="dur">时长</span></div>` + html + renderPagination();
}

// ── 艺术家/专辑 ──
async function loadArtists(container) {
  const r = await fetch(API + '/artists?page=' + currentPage + '&page_size=' + pageSize);
  const data = await r.json(); totalItems = data.total;
  let html = data.artists.map(a =>
    `<div class="artist-card" onclick="alert('艺术家: '+a.name)">
      <div class="cover-img">🎤</div>
      <div class="name">${esc(a.name)}</div>
      <div class="count">${a.song_count||0} 首</div>
    </div>`).join('');
  container.innerHTML = '<div class="artist-grid">' + html + '</div>' + renderPagination();
}
async function loadAlbums(container) {
  const r = await fetch(API + '/albums?page=' + currentPage + '&page_size=' + pageSize);
  const data = await r.json(); totalItems = data.total;
  let html = data.albums.map(a =>
    `<div class="album-card" onclick="alert('专辑: '+a.title)">
      <div class="cover-img">💿</div>
      <div class="title">${esc(a.title)}</div>
      <div class="meta">${esc(a.artist)} · ${a.song_count||0} 首</div>
    </div>`).join('');
  container.innerHTML = '<div class="album-grid">' + html + '</div>' + renderPagination();
}

// ── 搜索 ──
let searchTimer = null;
function onSearch(q) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    if (!q.trim()) { currentTab='songs'; loadTab(); return; }
    const r = await fetch(API + '/search?q=' + encodeURIComponent(q) + '&page=1&page_size=' + pageSize);
    const data = await r.json(); totalItems = data.total;
    const c = document.getElementById('content');
    let html = data.results.map((s, i) =>
      `<div class="song-row" data-id="${s.id}" onclick='playTrack(${JSON.stringify(s).replace(/"/g,'&quot;')})'>
        <span class="idx">${i+1}</span>
        <span class="title">${esc(s.title)}</span>
        <span class="artist">${esc(s.artist)}</span>
        <span class="album">${esc(s.album)}</span>
        <span class="dur">${fmtTime(s.duration)}</span>
      </div>`).join('');
    c.innerHTML = '<p style="color:#888;margin-bottom:12px;">搜索: ' + esc(q) + '</p>' + html + renderPagination();
  }, 300);
}

// ── 分页 ──
function renderPagination() {
  const tp = Math.ceil(totalItems / pageSize) || 1;
  return `<div class="pagination">
    <button ${currentPage<=1?'disabled':''} onclick="currentPage--;loadTab()">‹ 上一页</button>
    <span class="page-info">${currentPage} / ${tp}</span>
    <button ${currentPage>=tp?'disabled':''} onclick="currentPage++;loadTab()">下一页 ›</button>
  </div>`;
}
function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════════
// 📋 播放列表
// ═══════════════════════════════════════════
let currentPlaylistId = null; // 当前查看的播放列表 ID

async function loadPlaylists(container) {
  const r = await fetch(API + '/playlists?page=' + currentPage + '&page_size=' + pageSize);
  const data = await r.json(); totalItems = data.total;

  if (currentPlaylistId) {
    // 显示某个播放列表的详情
    await loadPlaylistDetail(container, currentPlaylistId);
    return;
  }

  let html = `<div style="margin-bottom:16px;display:flex;gap:10px;">
    <button class="btn-primary" onclick="showCreatePlaylistModal()">＋ 新建播放列表</button>
  </div>`;

  if (data.playlists.length === 0) {
    html += '<p style="color:#666;">暂无播放列表，点击上方按钮创建</p>';
  } else {
    html += '<div class="playlist-cards">';
    data.playlists.forEach(p => {
      html += `<div class="playlist-card" onclick="currentPlaylistId=${p.id};currentPage=1;loadTab()">
        <div>
          <div class="pl-name">${esc(p.name)}</div>
          <div class="pl-meta">${esc(p.description||'')} · ${p.song_count||0} 首</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn-secondary" style="font-size:12px;padding:4px 10px;" onclick="event.stopPropagation();playPlaylist(${p.id})">▶ 播放</button>
          <button style="background:none;border:none;color:#888;cursor:pointer;font-size:18px;" onclick="event.stopPropagation();deletePlaylist(${p.id},'${esc(p.name)}')">🗑</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html + renderPagination();
}

async function loadPlaylistDetail(container, playlistId) {
  const r = await fetch(API + '/playlists/' + playlistId);
  if (!r.ok) { currentPlaylistId = null; loadTab(); return; }
  const data = await r.json();

  let html = `<div class="playlist-header">
    <button class="btn-secondary" onclick="currentPlaylistId=null;loadTab()" style="font-size:13px;">‹ 返回</button>
    <h2>${esc(data.name)}</h2>
    <span style="color:#888;font-size:13px;">${data.songs?.length||0} 首</span>
    <div style="flex:1;"></div>
    <button class="btn-primary" onclick="playPlaylist(${playlistId})">▶ 播放全部</button>
    <button class="btn-secondary" onclick="showAddSongToPlaylistModal(${playlistId})">＋ 添加歌曲</button>
  </div>`;

  if (!data.songs || data.songs.length === 0) {
    html += '<p style="color:#666;">播放列表为空，点击"添加歌曲"</p>';
  } else {
    html += '<div>';
    data.songs.forEach((s, i) => {
      html += `<div class="playlist-song-row" data-id="${s.id}" onclick='playTrack(${JSON.stringify(s).replace(/"/g,'&quot;')})'>
        <span class="pl-song-idx">${i+1}</span>
        <span class="pl-song-title">${esc(s.title)}</span>
        <span class="pl-song-artist">${esc(s.artist)}</span>
        <span class="pl-song-dur">${fmtTime(s.duration)}</span>
        <span class="pl-song-actions">
          <button onclick="event.stopPropagation();removeSongFromPlaylist(${playlistId},${s.id})" title="移除">✕</button>
        </span>
      </div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

async function playPlaylist(playlistId) {
  const r = await fetch(API + '/playlists/' + playlistId);
  if (!r.ok) return;
  const data = await r.json();
  if (!data.songs || data.songs.length === 0) return;
  playlist = data.songs;
  currentIndex = -1;
  playTrack(playlist[0]);
}

async function removeSongFromPlaylist(playlistId, songId) {
  if (!confirm('确定从播放列表移除这首歌曲？')) return;
  const r = await fetch(API + '/playlists/' + playlistId + '/songs/' + songId, { method:'DELETE' });
  if (r.ok) loadPlaylistDetail(document.getElementById('content'), playlistId);
  else alert('移除失败');
}

async function deletePlaylist(playlistId, name) {
  if (!confirm('确定删除播放列表「' + name + '」？')) return;
  const r = await fetch(API + '/playlists/' + playlistId, { method:'DELETE' });
  if (r.ok) { currentPlaylistId = null; loadTab(); }
  else alert('删除失败');
}

// ── 新建播放列表模态框 ──
function showCreatePlaylistModal() {
  document.getElementById('modal-content').innerHTML = `
    <h3>新建播放列表</h3>
    <label>名称</label>
    <input type="text" id="modal-pl-name" placeholder="我的播放列表" style="width:100%;padding:8px 12px;border-radius:6px;border:1px solid #333;background:#0f0f23;color:#e0e0e0;font-size:14px;margin-top:4px;">
    <label style="margin-top:12px;display:block;color:#aaa;font-size:13px;">描述（可选）</label>
    <textarea id="modal-pl-desc" placeholder="描述..." style="width:100%;padding:8px 12px;border-radius:6px;border:1px solid #333;background:#0f0f23;color:#e0e0e0;font-size:14px;margin-top:4px;resize:vertical;min-height:50px;"></textarea>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="createPlaylist()">创建</button>
    </div>`;
  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(()=>document.getElementById('modal-pl-name')?.focus(), 50);
}

async function createPlaylist() {
  const name = document.getElementById('modal-pl-name').value.trim();
  if (!name) { alert('请输入名称'); return; }
  const desc = document.getElementById('modal-pl-desc').value.trim();
  const r = await fetch(API + '/playlists', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name, description: desc })
  });
  if (r.ok) { closeModal(); loadTab(); }
  else alert('创建失败');
}

// ── 添加歌曲到播放列表模态框 ──
async function showAddSongToPlaylistModal(playlistId) {
  // 先搜索歌曲
  document.getElementById('modal-content').innerHTML = `
    <h3>添加歌曲到播放列表</h3>
    <input type="text" id="modal-search-song" placeholder="搜索歌曲..." style="width:100%;padding:8px 12px;border-radius:6px;border:1px solid #333;background:#0f0f23;color:#e0e0e0;font-size:14px;" oninput="searchSongsForModal(${playlistId}, this.value)">
    <div id="modal-song-results" style="margin-top:12px;max-height:300px;overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">关闭</button>
    </div>`;
  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(()=>document.getElementById('modal-search-song')?.focus(), 50);
}

async function searchSongsForModal(playlistId, q) {
  const container = document.getElementById('modal-song-results');
  if (!q.trim()) { container.innerHTML = ''; return; }
  const r = await fetch(API + '/search?q=' + encodeURIComponent(q) + '&page_size=10');
  const data = await r.json();
  container.innerHTML = data.results.map(s =>
    `<div class="song-row" style="cursor:pointer;" onclick="addSongToPlaylist(${playlistId}, ${s.id}, '${esc(s.title)}')">
      <span class="title">${esc(s.title)}</span>
      <span class="artist" style="margin-left:12px;">${esc(s.artist)}</span>
    </div>`).join('');
}

async function addSongToPlaylist(playlistId, songId, title) {
  const r = await fetch(API + '/playlists/' + playlistId + '/songs', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ songId })
  });
  if (r.ok) {
    alert('已添加: ' + title);
    document.getElementById('modal-search-song').value = '';
    document.getElementById('modal-song-results').innerHTML = '';
    // 刷新播放列表详情
    if (currentPlaylistId) loadPlaylistDetail(document.getElementById('content'), currentPlaylistId);
  } else alert('添加失败');
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

// ═══════════════════════════════════════════
// ⚙️ 设置页面
// ═══════════════════════════════════════════
let scanTimer = null;

async function loadSettings(container) {
  // 获取统计信息
  const [songsR, artistsR, albumsR, favR, histR] = await Promise.all([
    fetch(API + '/songs?page=1&page_size=1'),
    fetch(API + '/artists?page=1&page_size=1'),
    fetch(API + '/albums?page=1&page_size=1'),
    fetch(API + '/favorites?page=1&page_size=1'),
    fetch(API + '/history?page=1&page_size=1')
  ]);
  const songsData = await songsR.json();
  const artistsData = await artistsR.json();
  const albumsData = await albumsR.json();
  const favData = await favR.json();
  const histData = await histR.json();

  // 获取扫描状态
  const scanStatusR = await fetch(API + '/scan/status');
  const scanStatus = await scanStatusR.json();

  let html = '';

  // ── 统计 ──
  html += `<div class="settings-section">
    <h3>📊 统计信息</h3>
    <div class="setting-row"><span class="setting-label">歌曲总数</span><span class="setting-value">${songsData.total || 0}</span></div>
    <div class="setting-row"><span class="setting-label">艺术家</span><span class="setting-value">${artistsData.total || 0}</span></div>
    <div class="setting-row"><span class="setting-label">专辑</span><span class="setting-value">${albumsData.total || 0}</span></div>
    <div class="setting-row"><span class="setting-label">收藏</span><span class="setting-value">${favData.total || 0}</span></div>
    <div class="setting-row"><span class="setting-label">播放历史</span><span class="setting-value">${histData.total || 0}</span></div>
  </div>`;

  // ── 扫描设置 ──
  html += `<div class="settings-section">
    <h3>🔍 音乐扫描</h3>
    <div class="setting-row">
      <span class="setting-label">音乐目录</span>
      <span class="setting-value" id="setting-music-dir">加载中...</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">扫描状态</span>
      <span class="setting-value" id="scan-status-text">${scanStatus.running ? '🔄 扫描中...' : '✅ 空闲'}</span>
    </div>
    <div id="scan-progress" style="display:${scanStatus.running?'block':'none'};margin-top:8px;">
      <div style="font-size:12px;color:#888;">已处理: <span id="scan-processed">${scanStatus.processedCount||0}</span> | 新增: <span id="scan-added">${scanStatus.addedCount||0}</span> | 更新: <span id="scan-updated">${scanStatus.updatedCount||0}</span> | 错误: <span id="scan-errors">${scanStatus.errorCount||0}</span></div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="scan-progress-bar"></div></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;">
      <button class="btn-primary" id="btn-scan" onclick="startScan()">🔍 开始扫描</button>
      <button class="btn-secondary" onclick="loadSettings(document.getElementById('content'))">🔄 刷新状态</button>
    </div>
  </div>`;

  // ── 数据库操作 ──
  html += `<div class="settings-section">
    <h3>🗄️ 数据库</h3>
    <div class="setting-row">
      <span class="setting-label">清除播放历史</span>
      <button class="btn-danger" style="font-size:13px;padding:6px 14px;" onclick="clearHistory()">清除</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">清除所有收藏</span>
      <button class="btn-danger" style="font-size:13px;padding:6px 14px;" onclick="clearFavorites()">清除</button>
    </div>
  </div>`;

  // ── 关于 ──
  html += `<div class="settings-section">
    <h3>ℹ️ 关于</h3>
    <div class="setting-row"><span class="setting-label">版本</span><span class="setting-value">CatClawMusicServer v1.0.0 (C# .NET 8)</span></div>
    <div class="setting-row"><span class="setting-label">API 文档</span><a href="/swagger" target="_blank" style="color:#00d4ff;">打开 Swagger</a></div>
  </div>`;

  container.innerHTML = html;

  // 加载音乐目录配置
  fetch('/api/config').then(r=>r.json()).then(cfg=>{
    const dir = cfg?.musicDirectory || '(未配置)';
    document.getElementById('setting-music-dir').textContent = dir;
  }).catch(()=>{
    document.getElementById('setting-music-dir').textContent = '(无法读取配置)';
  });

  // 如果正在扫描，启动轮询
  if (scanStatus.running) startScanPolling();
}

async function startScan() {
  const r = await fetch(API + '/scan', { method:'POST' });
  const data = await r.json();
  if (r.ok) {
    document.getElementById('scan-status-text').textContent = '🔄 扫描中...';
    document.getElementById('scan-progress').style.display = 'block';
    startScanPolling();
  } else {
    alert(data.message || '启动扫描失败');
  }
}

function startScanPolling() {
  if (scanTimer) clearInterval(scanTimer);
  scanTimer = setInterval(async () => {
    const r = await fetch(API + '/scan/status');
    const s = await r.json();
    document.getElementById('scan-processed').textContent = s.processedCount || 0;
    document.getElementById('scan-added').textContent = s.addedCount || 0;
    document.getElementById('scan-updated').textContent = s.updatedCount || 0;
    document.getElementById('scan-errors').textContent = s.errorCount || 0;
    if (!s.running) {
      clearInterval(scanTimer);
      scanTimer = null;
      document.getElementById('scan-status-text').textContent = '✅ 完成';
      setTimeout(()=>loadSettings(document.getElementById('content')), 1000);
    }
  }, 1500);
}

async function clearHistory() {
  if (!confirm('确定清除所有播放历史？')) return;
  const r = await fetch(API + '/history', { method:'DELETE' });
  if (r.ok) alert('已清除'); else alert('清除失败');
}

async function clearFavorites() {
  if (!confirm('确定清除所有收藏？')) return;
  // 逐个删除（简单处理）
  const r = await fetch(API + '/favorites?page=1&page_size=9999');
  const data = await r.json();
  let ok = true;
  for (const s of (data.songs||[])) {
    const dr = await fetch(API + '/favorites/' + s.id, { method:'DELETE' });
    if (!dr.ok) ok = false;
  }
  alert(ok ? '已清除' : '部分清除失败');
  loadSettings(document.getElementById('content'));
}

// ── 退出 ──
async function doLogout() {
  await fetch('/api/auth/logout', { method:'POST' });
  location.href = '/login.html';
}

// ── 初始化 ──
loadTab();
</script>
