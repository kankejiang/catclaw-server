<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatClaw Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  <!-- Import Map for ES Modules -->
  <script type="importmap">
  {
    "imports": {
      "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.prod.js",
      "vue-router": "https://unpkg.com/vue-router@4/dist/vue-router.esm-browser.prod.js",
      "@vue/devtools-api": "https://unpkg.com/@vue/devtools-api@6.6.4/lib/esm/index.js"
    }
  }
  </script>

  <!-- HLS.js for adaptive streaming -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

  <style>
    #app-loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0a0a0f;
      color: #9090a8; font-family: 'Inter', sans-serif; z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #app-loader.hidden { opacity: 0; pointer-events: none; }
    #app-loader .spinner {
      width: 36px; height: 36px; border: 3px solid #2a2a42;
      border-top-color: #00d4ff; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app-error {
      position: fixed; bottom: 20px; left: 20px; right: 20px;
      background: #1a1a28; border: 1px solid #ff4757; border-radius: 8px;
      padding: 12px 16px; color: #ff4757; font-family: monospace; font-size: 13px;
      z-index: 10000; display: none; max-height: 200px; overflow-y: auto;
    }
  </style>
</head>
<body>
  <!-- Loading indicator (hidden once Vue mounts) -->
  <div id="app-loader">
    <div class="spinner"></div>
    <div>正在加载 CatClaw Music...</div>
  </div>

  <!-- Error display (shown if JS fails) -->
  <div id="app-error"></div>

  <div id="app"></div>
  <script type="module" src="/js/app.js"></script>

  <!-- Global error handler -->
  <script>
    window.addEventListener('error', function(e) {
      var el = document.getElementById('app-error');
      if (el) {
        el.style.display = 'block';
        el.textContent += '[Error] ' + e.message + ' (' + e.filename + ':' + e.lineno + ')\n';
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('app-error');
      if (el) {
        el.style.display = 'block';
        el.textContent += '[Promise] ' + (e.reason?.message || e.reason || 'Unknown') + '\n';
      }
    });
    // Hide loader after 10s timeout even if Vue fails
    setTimeout(function() {
      var loader = document.getElementById('app-loader');
      if (loader && !loader.classList.contains('hidden')) {
        loader.classList.add('hidden');
        var errEl = document.getElementById('app-error');
        if (errEl && !errEl.textContent) {
          errEl.style.display = 'block';
          errEl.textContent = '[Timeout] Vue 应用加载超时，请检查控制台 (F12) 或网络连接';
        }
      }
    }, 10000);
  </script>
</body>
</html>
