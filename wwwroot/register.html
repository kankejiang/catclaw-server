<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册管理员 - CatClaw Music Server</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:'Segoe UI',sans-serif;
    background:#0f0f23;
    color:#e0e0e0;
    display:flex; justify-content:center; align-items:center;
    height:100vh;
}
.card {
    background:#1a1a2e;
    padding:40px 36px;
    border-radius:16px;
    width:380px;
    max-width:90vw;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.card h2 { color:#00d4ff; text-align:center; margin-bottom:6px; font-size:22px; }
.card .sub { text-align:center; color:#888; font-size:13px; margin-bottom:24px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:13px; color:#888; margin-bottom:6px; }
.field input {
    width:100%; padding:10px 14px;
    border-radius:8px; border:1px solid #333;
    background:#0f0f23; color:#e0e0e0;
    font-size:14px;
}
.field input:focus { outline:none; border-color:#00d4ff; }
.btn {
    width:100%; padding:12px;
    background:#00d4ff; color:#0f0f23;
    border:none; border-radius:8px;
    font-size:15px; font-weight:600; cursor:pointer;
    transition:opacity 0.2s;
}
.btn:hover { opacity:0.85; }
.msg { text-align:center; margin-top:14px; font-size:13px; color:#f66; min-height:20px; }
.msg.ok { color:#0f6; }
.login-link { text-align:center; margin-top:16px; font-size:13px; color:#888; }
.login-link a { color:#00d4ff; text-decoration:none; }
/* 密码字段用 text-security 替代 type="password"，支持中文输入法 */
.pwd-field { -webkit-text-security: disc; -moz-text-security: disc; text-security: disc; }
</style>
</head>
<body>
<div class="card">
    <h2>CatClaw Music Server</h2>
    <div class="sub">首次使用，请创建管理员账号</div>
    <div class="field">
        <label>用户名</label>
        <input type="text" id="username" placeholder="admin" autocomplete="off">
    </div>
    <div class="field">
        <label>密码</label>
        <input type="text" class="pwd-field" id="password" placeholder="至少 4 个字符（支持中文）" autocomplete="new-password">
    </div>
    <div class="field">
        <label>确认密码</label>
        <input type="text" class="pwd-field" id="password2" placeholder="再次输入密码" autocomplete="new-password">
    </div>
    <button class="btn" onclick="doRegister()">创 建 管 理 员</button>
    <div class="msg" id="msg"></div>
    <div class="login-link">
        <a href="/login.html">已有管理员？去登录 →</a>
    </div>
</div>

<script>
async function checkConfigured() {
    try {
        const r = await fetch('/api/auth/status');
        const j = await r.json();
        if (j.configured) location.href = '/login.html';
    } catch {}
}
checkConfigured();

async function doRegister() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const p2 = document.getElementById('password2').value.trim();
    const msg = document.getElementById('msg');
    msg.textContent = ''; msg.className = 'msg';

    if (!u) { msg.textContent = '请输入用户名'; return; }
    if (u.length < 2) { msg.textContent = '用户名至少 2 个字符'; return; }
    if (!p) { msg.textContent = '请输入密码'; return; }
    if (p.length < 4) { msg.textContent = '密码至少 4 个字符'; return; }
    if (p !== p2) { msg.textContent = '两次密码不一致'; return; }

    try {
        const res = await fetch('/api/auth/register', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ username:u, password:p })
        });
        const j = await res.json();
        if (res.ok) {
            msg.className = 'msg ok';
            msg.textContent = '注册成功，跳转中…';
            setTimeout(() => location.href = '/', 500);
        } else {
            msg.textContent = j.message || '注册失败';
        }
    } catch {
        msg.textContent = '网络错误，请重试';
    }
}
document.getElementById('password2').addEventListener('keydown', e => {
    if (e.key === 'Enter') doRegister();
});
</script>
</body>
</html>
