<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - CatClaw Music Server</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:'Segoe UI',sans-serif;
    background:#0f0f23;
    color:#e0e0e0;
    display:flex; justify-content:center; align-items:center;
    height:100vh;
}
.card {
    background:#1a1a2e;
    padding:40px 36px;
    border-radius:16px;
    width:360px;
    max-width:90vw;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.card h2 {
    color:#00d4ff;
    text-align:center;
    margin-bottom:28px;
    font-size:22px;
}
.field { margin-bottom:18px; }
.field label {
    display:block; font-size:13px; color:#888;
    margin-bottom:6px;
}
.field input {
    width:100%; padding:10px 14px;
    border-radius:8px; border:1px solid #333;
    background:#0f0f23; color:#e0e0e0;
    font-size:14px;
}
.field input:focus { outline:none; border-color:#00d4ff; }
.btn {
    width:100%; padding:12px;
    background:#00d4ff; color:#0f0f23;
    border:none; border-radius:8px;
    font-size:15px; font-weight:600; cursor:pointer;
    transition:opacity 0.2s;
}
.btn:hover { opacity:0.85; }
.msg { text-align:center; margin-top:14px; font-size:13px; color:#f66; min-height:20px; }
.msg.ok { color:#0f6; }
.reg-link { text-align:center; margin-top:16px; font-size:13px; color:#888; line-height:1.6; }
.reg-link code { background:#0f0f23; padding:2px 8px; border-radius:4px; color:#00d4ff; border:1px solid #333; }
</style>
</head>
<body>
<div class="card">
    <h2>CatClaw Music Server</h2>
    <div class="field">
        <label>用户名</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
        <label>密码</label>
        <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
    </div>
    <button class="btn" onclick="doLogin()">登 录</button>
    <div class="msg" id="msg"></div>
    <div class="reg-link">忘记密码？请在服务端控制台执行 <code>claw reset</code> 重置账号</div>
</div>

<script>
async function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const msg = document.getElementById('msg');
    msg.textContent = ''; msg.className = 'msg';
    if (!u || !p) { msg.textContent = '请输入用户名和密码'; return; }
    try {
        const res = await fetch('/api/auth/login', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ username:u, password:p })
        });
        if (res.ok) {
            msg.className = 'msg ok';
            msg.textContent = '登录成功，跳转中…';
            setTimeout(() => location.href = '/', 500);
        } else {
            const j = await res.json();
            msg.textContent = j.message || '登录失败';
        }
    } catch {
        msg.textContent = '网络错误，请重试';
    }
}
document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
